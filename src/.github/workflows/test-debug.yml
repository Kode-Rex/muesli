name: Test Debug

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  debug:
    name: Debug Tests
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: List Directory Structure
      run: |
        echo "🔍 Repository structure:"
        find . -name "*.swift" -type f | head -20
        
    - name: Check Xcode Project
      working-directory: src/Muesli
      run: |
        echo "📁 Muesli project contents:"
        ls -la
        echo ""
        echo "🧪 Test files:"
        find MuesliTests -name "*.swift" -type f
        
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Quick Build Test
      working-directory: src/Muesli
      run: |
        echo "🏗️ Testing basic build..."
        xcodebuild -list
        echo ""
        echo "🧪 Running unit tests only..."
        xcodebuild test \
          -scheme Muesli \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          -only-testing:MuesliTests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
