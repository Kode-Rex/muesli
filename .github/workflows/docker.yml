name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'src/api/**'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build, scan & push API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # for uploading Trivy SARIF
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}-api
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Build locally first (load=true) so Trivy can scan it before any push.
      - name: Build (load to local for scan)
        uses: docker/build-push-action@v5
        with:
          context: src/api
          file: src/api/Dockerfile
          platforms: linux/amd64
          load: true
          tags: muesli-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: muesli-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Push (tagged variants)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: src/api
          file: src/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
