name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (lint + test + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    env:
      ANTHROPIC_API_KEY: test-key
      DEEPGRAM_API_KEY: test-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/api/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (unit + integration with mocks)
        run: npm run test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: src/api/coverage/
          retention-days: 14

      # Dependency vulnerability check. Fails CI on high or critical findings.
      # Advisory-only (--audit-level=high) so moderate noise from transitive
      # deps doesn't block PRs; bump to moderate once we triage the existing
      # warnings.
      - name: npm audit (high+critical)
        run: npm audit --audit-level=high --omit=dev
