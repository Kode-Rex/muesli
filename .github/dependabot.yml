version: 2
updates:
  - package-ecosystem: npm
    directory: /src/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "api"]
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]

  - package-ecosystem: docker
    directory: /src/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels: ["dependencies", "docker"]
